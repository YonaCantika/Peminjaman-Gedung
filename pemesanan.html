<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pemesanan - MWB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --mwb-green: #064e3b;
            --mwb-light-green: #ecfdf5;
            --mwb-accent: #059669;
        }

        body {
            background-color: #f0fdf4;
            margin-left: 260px;
        }

        /* Sidebar sama dengan sebelumnya */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: var(--mwb-green);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 25px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            margin-bottom: 8px;
            padding: 12px 15px;
            text-decoration: none;
            display: block;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.15);
            color: #6ee7b7;
            font-weight: 600;
        }

        .main-content {
            padding: 40px;
        }

        /* Filter Pills */
        .nav-pills-custom .nav-link {
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
            margin-left: 5px;
            padding: 5px 15px;
            font-size: 14px;
        }

        .nav-pills-custom .nav-link.active {
            background: var(--mwb-green);
            color: white;
            border-color: var(--mwb-green);
        }

        /* Table & Action Buttons */
        .btn-action {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
        }

        .btn-confirm {
            background-color: #3b82f6;
            color: white;
        }

        /* Tombol konfirmasi tetap biru atau bisa hijau */
        .btn-delete {
            background-color: #fee2e2;
            color: #ef4444;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-dikonfirmasi {
            background: #d1fae5;
            color: #065f46;
        }

        .status-selesai {
            background: #e0e7ff;
            color: #4338ca;
        }
    </style>
</head>

<body>

    <div class="sidebar shadow-lg">
        <div class="d-flex align-items-center mb-5 px-2">
            <span class="fs-4 fw-bold">🏠 MWB Admin</span>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="#">📊 Overview</a>
            <a class="nav-link active" href="#">📋 Pemesanan</a>
            <a class="nav-link" href="#">🗓️ Jadwal Gedung</a>
        </nav>
        <div style="position: absolute; bottom: 30px; width: 210px;">
            <hr class="text-white-50">
            <a class="nav-link text-warning mb-0" href="#">🔓 Logout</a>
        </div>
    </div>

    <div class="main-content">
        <h3 class="fw-bold mb-4">Kelola Pemesanan</h3>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Daftar Pemesanan (4)</h5>
                    <div class="nav nav-pills nav-pills-custom">
                        <button class="nav-link active">Semua</button>
                        <button class="nav-link">pending</button>
                        <button class="nav-link">dikonfirmasi</button>
                        <button class="nav-link">dibatalkan</button>
                        <button class="nav-link">selesai</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="bg-light">
                            <tr class="text-muted small">
                                <th>PEMESAN</th>
                                <th>GEDUNG</th>
                                <th>TANGGAL</th>
                                <th>NO. WA</th>
                                <th>STATUS</th>
                                <th class="text-center">AKSI</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <strong>qwerty</strong><br>
                                    <small class="text-muted">qwerty</small><br>
                                    <small class="text-success small">📝 ssagajshgdlksagdj</small>
                                </td>
                                <td>Gedung Paruga Samakai</td>
                                <td>25 Apr 2026</td>
                                <td class="text-primary">081273637821</td>
                                <td><span class="status-badge status-dikonfirmasi">Dikonfirmasi</span></td>
                                <td class="text-center">
                                    <button class="btn-action btn-confirm me-1">📦</button>
                                    <button class="btn-action btn-delete">🗑️</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
